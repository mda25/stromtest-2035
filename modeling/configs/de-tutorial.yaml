# DE-tutorial config for stromtest-2035 smoke testing.
#
# Mirrors PyPSA-Eur's config/test/config.electricity.yaml pattern but for
# Germany only, with the entsoegridkit base_network (which ships bundled
# data so no heavy OSM download is needed) and a tiny snapshot range.
#
# Phase 1 (this file): default k-means clustering (4 clusters), validates
# that PyPSA-Eur + entsoegridkit + DE works end-to-end.
#
# Phase 2 (TODO): set clustering.mode: custom_busmap to use our 4-zone
# UNB busmap.

tutorial: true

run:
  name: "de-tutorial"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters:
  - 4
  opts:
  - ''

countries: ['DE']

snapshots:
  start: "2013-03-01"
  end: "2013-03-08"

electricity:
  base_network: entsoegridkit

  co2limit_enable: true
  co2limit: 200.e+6

  extendable_carriers:
    Generator: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, nuclear]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 pipeline]

  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float]
  estimate_renewable_capacities:
    enable: true
    from_powerplantmatching: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

atlite:
  default_cutout: de-03-2013-era5
  cutouts:
    de-03-2013-era5:
      module: era5
      x: [5., 16.]
      y: [46., 56.]
      time: ["2013-03-01", "2013-03-08"]

renewable:
  offwind-ac:
    max_depth: false
  offwind-dc:
    max_depth: false
  offwind-float:
    max_depth: false
    min_depth: false

clustering:
  exclude_carriers: ["OCGT", "offwind-ac", "coal"]
  temporal:
    resolution_elec: 24h

lines:
  dynamic_line_rating:
    activate: true
    max_line_rating: 1.3

solving:
  solver:
    name: highs
    options: highs-default

# Tell PyPSA-Eur to build the cutout via CDS rather than retrieving it from
# data.pypsa.org (which only ships europe-2013 + be-03-2013). Config key
# is `data.cutout.source` per rules/common.smk:dataset_version.
data:
  cutout:
    source: build
    version: latest
