capacities_2035_gw:

  # ~145 GW national, sits above EEG 2030 (115) and below 2040 (160).
  # LFS3 T45-Strom assumes accelerated WindBG implementation with strong
  # southern catch-up.
  # [MEDIUM] per-zone shares derived from Windmonitor 2024 + accelerated
  # southern allocation under T45 trajectory
  wind_onshore:
    50hertz: 42.0          # Brandenburg + MV + Sa/SAn/Th + Berlin (strong eastern wind)
    tennet: 58.0           # Niedersachsen + SH + Bayern (accelerated) + Hessen + Bremen
    amprion: 30.0          # NRW + RLP + Saarland
    transnetbw: 15.0       # Baden-Württemberg under WindBG 2% catch-up
    citation_ref: "LFS3-T45-Strom"

  # 40 GW law (WindSeeG § 1) — same as Reiche, as this is statutory.
  # [HIGH] national total, [MEDIUM] per-zone landing allocation
  wind_offshore:
    50hertz: 6.0           # Mecklenburg-Vorpommern (Baltic landings)
    tennet: 34.0           # Niedersachsen + Schleswig-Holstein (North Sea)
    amprion: 0.0
    transnetbw: 0.0
    citation_ref: "WindSeeG-2023"

  # ~325 GW national. LFS3 T45-Strom: from 2030 onward +30 GW/year, giving
  # 215+150 = 365 GW by 2035. Tightened to 325 reflecting a conservative
  # reading of LFS3 build-rate assumptions vs. EEG-2023 floor.
  # [MEDIUM] national from LFS3; [MEDIUM] per-zone from current shares
  solar_pv:
    50hertz: 68.0          # Brandenburg ground-mount strong, Sa/SAn growing
    tennet: 145.0          # Bayern (~110 GW share), Niedersachsen, Hessen
    amprion: 67.0          # NRW + RLP + Saar
    transnetbw: 45.0       # Baden-Württemberg
    citation_ref: "LFS3-T45-Strom"

  # ~10 GW national — the pre-KWSG-3.0 Habeck-era Kraftwerksstrategie. The
  # Ampel had announced ~8-10 GW H2-ready gas (Eckpunkte Juli 2023) but
  # implementation stalled. T45 pathway uses gas mostly for spitzenlast.
  # [MEDIUM] national; [LOW] per-zone allocation pattern
  gas_backup:
    50hertz: 1.5
    tennet: 3.5
    amprion: 3.0
    transnetbw: 2.0
    citation_ref: "LFS3-T45-Strom"

  # ~28 GW national. NWS Fortschreibung: 10 GW by 2030; T45 pathway accelerates
  # to ~30 GW by 2035 then 80 GW by 2045 per NEP B 2045. Allocation favours
  # wind-surplus zones plus NRW industrial co-location.
  # [MEDIUM] national; [LOW] per-zone allocation
  hydrogen_electrolyzer:
    50hertz: 8.0
    tennet: 11.0
    amprion: 6.0
    transnetbw: 3.0
    citation_ref: "NWS-Fortschreibung-2023"

  # ~60 TWh national. LFS3 T45 indicates 70-100 TWh long-term need; the
  # 2035 milestone sits at ~60 TWh reflecting partial cavern build-out.
  # [MEDIUM] national value
  hydrogen_storage_twh:
    value: 60.0
    citation_ref: "LFS3-T45-Strom"

  # ~80 GWh national. T45 pathway needs more flex than NEP 2037 V2025 B
  # because it has less gas backup; battery + DSM fills the gap. Scaled up
  # from NEP B 2037 (61 GWh) by ~30%.
  # [MEDIUM] national value
  battery_storage_gwh:
    value: 80.0
    citation_ref: "Agora-KNStrom2035"

  # Same baseline as Reiche — pumped hydro stock is geography-limited and
  # almost identical across scenarios. Existing ~5.2 GW + tiny repowering.
  # [HIGH] from current plant inventory
  pumped_hydro:
    50hertz: 2.1
    tennet: 1.0
    amprion: 0.3
    transnetbw: 1.9
    citation_ref: "NEP-2037-V2023"

# Habeck-era demand: full electrification pathway under T45.
demand_2035:
  # ~780 TWh — sits between NEP 2037 B (~700) and high-electrification
  # variants (~800-1000). Reflects faster heat pump + EV rollout +
  # accelerated electrolyzer demand.
  # [MEDIUM]
  baseline_twh: 780.0
  # ~55% of building heat from HPs by 2035. LFS3 T45 assumes 5.2 M HPs by
  # 2030 (+2 M hybrids) → ~10-11 M by 2035 → 55% share.
  # [MEDIUM]
  heat_pump_share: 0.55
  # ~70% of passenger fleet electrified by 2035. Ampel's 15 M BEV-by-2030
  # target implied ~70% share by 2035.
  # [MEDIUM]
  ev_share_passenger: 0.70
  # 28 GW electrolyzer × ~4500 FLH ≈ 126 TWh electricity for H2 production.
  # [MEDIUM]
  electrolyzer_demand_twh: 126.0
  citation_refs:
    - "LFS3-T45-Strom"
    - "NWS-Fortschreibung-2023"
    - "BMWK-LFS3-Overview"

