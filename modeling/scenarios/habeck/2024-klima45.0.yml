# Habeck-Era Klimaneutralität 2045 — Stand 2024-09-30
#
# Represents the trajectory implied by the previous BMWK leadership under
# Robert Habeck (Ampel coalition, 2021-2025). Anchored on:
#   - Klimaschutzgesetz 2021 (Klimaneutralität 2045 target)
#   - BMWK Langfristszenarien 3 T45-Strom (2023, the Habeck-era reference
#     pathway, strong direct electrification)
#   - Original Kraftwerksstrategie (smaller gas backup, ~10 GW, pre-KWSG-3.0)
#   - NWS Fortschreibung 2023 (10 GW electrolyzer by 2030 → fast ramp)
#   - EEG-2023 / WindSeeG / Solarpaket I+II
#
# Versioned 2024-09-30 to anchor on the policy stack as it stood just
# before the Ampel collapse (November 2024). Numbers reflect the
# trajectory that would have been pursued absent the change of government.
# Provided as a comparison anchor for the Reiche scenario.
#
# Confidence markers in inline comments:
#   [HIGH]   = directly cited from a published target / law
#   [MEDIUM] = derived from Langfristszenarien T45 or scaled from NEP V2023 B
#   [LOW]    = best-effort estimate where no public per-zone breakdown exists

id: habeck
version: "2024-09-30.0"
display_name: "Habeck-Era Klimaneutralität 2045 (Stand 2024-09)"
description: |
  Trajectory implied by the Habeck-led BMWK and the Ampel coalition before
  its November 2024 collapse. Reference pathway is Langfristszenarien 3
  T45-Strom with strong direct electrification: faster heat pump rollout,
  faster EV adoption, higher 2035 electrolyzer capacity, smaller gas backup
  vs. the later Reiche-era Kraftwerksstrategie. Used as comparison anchor
  in stromtest-2035; not the currently-operative plan in 2026.
authors:
  - matthis-damm

