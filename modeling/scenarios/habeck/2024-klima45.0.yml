  tennet_to_50hertz: 10.0
  tennet_to_amprion: 8.0
  amprion_to_tennet: 8.0
  amprion_to_50hertz: 5.0
  50hertz_to_amprion: 5.0
  amprion_to_transnetbw: 6.0
  transnetbw_to_amprion: 6.0
  tennet_to_transnetbw: 4.0
  transnetbw_to_tennet: 4.0
