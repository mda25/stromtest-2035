# Reiche-Bundesregierung Plan — Stand 2026-05-17
#
# First authored version of the Reiche scenario family. Reflects the
# energy plan as it stands under the Reiche-led BMWE in mid-2026:
#   - Up to 20 GW H2-ready gas backup tendered via KWSG (Kraftwerksstrategie
#     Grundsatzeinigung mit der EU-Kommission, 15 January 2026; 12 GW in
#     first tender 2026, rest in 2027 + 2029/2030)
#   - Renewable expansion targets per EEG-2023 and WindSeeG-2023 retained
#     (115 GW onshore wind by 2030, 40 GW offshore wind by 2035, 215 GW
#     solar by 2030); 2035 figures interpolated to ~140 GW wind onshore,
#     ~290 GW solar PV
#   - Hydrogen ramp pace de-prioritised vs. Habeck-era; electrolyzer scaled
#     down to ~15 GW total by 2035 vs. ~25-30 GW in Klimaneutral pathways
#   - Heat pump and EV adoption pace slowed vs. Habeck-era targets
#
# Spatial allocation: scaled from current Bundesland-level production
# (Fraunhofer Windmonitor + AGEE-Stat) using WindBG 2% land-area logic
# for onshore wind; offshore allocated to landing points in Nds/SH/MV;
# solar allocated proportionally to current per-zone share with some
# rebalancing toward southern Bundesländer (Bayern, BW) reflecting their
# population + roof-area advantage.
#
# Confidence markers in inline comments:
#   [HIGH]   = directly cited from a current published target / law
#   [MEDIUM] = derived by allocating a national total via spatial proxy
#   [LOW]    = best-effort estimate where no public per-zone breakdown exists

id: reiche
version: "2026-05-17.0"
display_name: "Reiche-Bundesregierung Plan (Stand 2026-05)"
description: |
  Translation of the German Bundesregierung's energy plan into runnable
  2035 capacity, demand, and storage data under the Reiche-led BMWE. Baseline
  is NEP 2037 V2025 Scenario B; amended on gas backup (Kraftwerksstrategie,
  Koalitionsvertrag CDU/CSU-SPD 2025), hydrogen pace (slowed vs. Habeck-era
  NWS Fortschreibung), and demand profile (slower heat pump rollout). Initial
  draft for stromtest-2035; numbers reviewed but not yet externally validated.
authors:
  - matthis-damm

